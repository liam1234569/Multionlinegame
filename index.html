<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Wars 3D: Modular Edition</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
</head>
<body>

    <div id="loader-screen">
        <div class="spinner"></div>
        <p id="loading-text">INITIALISIERE MODULE...</p>
    </div>

    <div id="main-menu" class="overlay hidden">
        <div class="menu-content">
            <h1>STREET WARS 3D</h1>
            
            <div id="ui-step-1">
                <h3>WÄHLE DEIN SETUP</h3>
                <button class="menu-btn" onclick="UI.selectDevice('pc')">💻 PC (WASD + MAUS)</button>
                <button class="menu-btn" onclick="UI.selectDevice('mobile')">📱 HANDY (TOUCH)</button>
            </div>

            <div id="ui-step-2" class="hidden">
                <h3>WÄHLE MISSION</h3>
                <button class="menu-btn" onclick="UI.selectMode('zombies')">🧟 ZOMBIE GASSE</button>
                <button class="menu-btn" onclick="UI.selectMode('parkour_human')">🏃 MENSCH PARKOUR</button>
                <button class="menu-btn" onclick="UI.selectMode('parkour_car')">🚗 AUTO PARKOUR</button>
            </div>
        </div>
    </div>

    <div id="game-hud" class="hidden">
        <div id="crosshair"></div>
        <div class="stats">
            <div class="stat-item">PUNKTE: <span id="score-val">0</span></div>
            <div class="health-container">
                <div id="health-bar"></div>
            </div>
        </div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
        </div>
        <button id="shoot-btn">FEUER</button>
    </div>

    <script src="utils_helpers.js"></script>
    
    <script src="physic_core.js"></script>
    <script src="physic_car.js"></script>
    <script src="physic_human.js"></script>

    <script src="world_alley.js"></script>
    <script src="world_parkour.js"></script>
    <script src="actor_player.js"></script>
    <script src="actor_car.js"></script>
    <script src="actor_zombie.js"></script>

    <script src="input_keyboard.js"></script>
    <script src="input_joystick.js"></script>

    <script src="combat_weapons.js"></script>
    <script src="combat_collision.js"></script>

    <script src="ui_menu.js"></script>
    <script src="ui_hud.js"></script>

    <script src="engine_render.js"></script>
    <script src="engine_main.js"></script>

</body>
</html>
